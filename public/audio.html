<!DOCTYPE html>
<html lang="es" style="background:#000; color: #00f3ff; font-family: monospace;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar Audio Source</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
        }

        /* ROLE OVERLAY */
        #role-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .role-btn {
            background: #222;
            border: 1px solid #ff0055;
            color: #fff;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            margin: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: left;
            position: relative;
        }

        .role-btn:hover {
            background: #333;
        }

        .role-id {
            font-size: 0.8rem;
            color: #888;
        }

        .role-icon {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 1.5rem;
        }

        /* MAIN UI */
        .vu-meter {
            width: 80px;
            height: 300px;
            background: #111;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .vu-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #0f0, #ff0, #f00);
            transition: height 0.1s ease;
        }

        .mic-select {
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            margin-bottom: 20px;
        }

        .status {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- ROLE SELECTION -->
    <div id="role-overlay">
        <h2 style="color:#ff0055; margin-bottom:30px;">SELECT AUDIO ROLE</h2>
        <div id="role-list" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <div style="color:#666;">Waiting for Director scenes...</div>
        </div>
    </div>

    <!-- MAIN UI -->
    <div class="vu-meter">
        <div id="vu-level" class="vu-bar"></div>
    </div>

    <select id="mic-select" class="mic-select" onchange="startStream(this.value)"></select>

    <div class="status">
        <span id="role-display" style="color:#aaa;">NO ROLE</span> •
        <span id="status-text" style="color:red">OFFLINE</span>
    </div>

    <div id="debug-log"
        style="font-size:10px; color:#0f0; max-height:100px; overflow-y:auto; width:90%; background:rgba(0,0,0,0.5); padding:5px; text-align:left; position:fixed; bottom:0; left:5%; z-index:10000;">
    </div>

    <script>
        const socket = io();

        socket.on('connect', () => {
            if (currentTarget) {
                log("Re-connected. Refreshing registration...");
                if (mySourceId) {
                    socket.emit('register', { role: mySourceId, target: currentTarget });
                } else {
                    socket.emit('register', { role: 'source_candidate', target: currentTarget });
                }
            }
        });

        const debugLog = document.getElementById('debug-log');
        const roleList = document.getElementById('role-list');
        const roleOverlay = document.getElementById('role-overlay');
        const statusText = document.getElementById('status-text');
        const roleDisplay = document.getElementById('role-display');
        const micSelect = document.getElementById('mic-select');
        const vuLevel = document.getElementById('vu-level');

        window.onerror = function (msg, url, line) {
            log(`CRITICAL JS ERROR: ${msg} (at ${line})`);
            if (statusText) statusText.innerText = "JS ERROR: See Log";
        };

        function log(msg) {
            console.log(msg);
            if (socket && socket.connected) socket.emit('client_log', `[AUDIO-${mySourceId || '?'}]: ${msg}`);
            if (debugLog) {
                const line = document.createElement('div');
                line.style.borderBottom = "1px solid rgba(0,243,255,0.1)";
                line.style.padding = "2px 0";
                line.innerHTML = `<span style="color:#666;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                debugLog.insertBefore(line, debugLog.firstChild);
                if (debugLog.children.length > 50) debugLog.lastChild.remove();
            }
        }

        // State
        let mySourceId = null;
        let myDestSocketId = null; // Direct signaling target
        let localStream = null;
        let peerConnection = null;
        let audioContext, analyser, microphone, javascriptNode;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const urlParams = new URLSearchParams(window.location.search);
        let currentTarget = urlParams.get('target');
        let isLive = false; // "Initialize" button clicked?

        // 1. Initial Logic
        if (!currentTarget) {
            log("No target specified. Discovering channels...");
            socket.emit('get_channels', (channels) => {
                roleList.innerHTML = '';
                if (!channels || channels.length === 0) {
                    roleList.innerHTML = '<div style="color:#666;">No active channels found.</div>';
                    return;
                }
                channels.forEach(channel => {
                    const btn = document.createElement('button');
                    btn.className = 'role-btn';
                    btn.style.borderColor = '#ff0055';
                    btn.innerHTML = `
                        <div>CHANNEL: ${channel.name}</div>
                        <div class="role-id">ID: ${channel.id}</div>
                        <div class="role-icon">🌐</div>
                    `;
                    btn.onclick = () => {
                        currentTarget = channel.id;
                        document.querySelector('#role-overlay h2').innerText = "SELECT AUDIO ROLE";
                        startRegistration();
                    };
                    roleList.appendChild(btn);
                });
            });
        } else {
            startRegistration();
        }

        function startRegistration() {
            log(`Registering on target: ${currentTarget}`);
            socket.emit('register', { role: 'source_candidate', target: currentTarget });
        }

        socket.on('scene_update', (data) => {
            log("Received scene_update from target: " + (data.target || 'unknown'));
            const scene = data.scene || data;
            const incomingTarget = (data.target || '').toLowerCase();

            if (currentTarget && incomingTarget !== currentTarget.toLowerCase()) return;
            if (mySourceId) return;

            const audioSlots = scene.layers.filter(l => l.type.includes('webrtc_audio'));

            // AUTO-JOIN LOGIC: If only one slot exists, offer a "START" button for gesture
            if (audioSlots.length === 1) {
                log(`Auto-Join candidate found: ${audioSlots[0].id}`);
                roleList.innerHTML = '';
                const btn = document.createElement('button');
                btn.className = 'role-btn';
                btn.style.background = '#ff0055';
                btn.style.color = '#fff';
                btn.style.textAlign = 'center';
                btn.innerHTML = `
                    <div style="font-weight:bold; font-size:1.5rem;">START AUTO-CONNECT</div>
                    <div class="role-id">Targeting: ${audioSlots[0].id}</div>
                    <div class="role-icon">⚡</div>
                `;
                btn.onclick = () => assignRole(audioSlots[0].source_id);
                roleList.appendChild(btn);
                return;
            }

            roleList.innerHTML = '';
            if (audioSlots.length === 0) {
                roleList.innerHTML = `<div style="color:#666;">No audio slots available in ${currentTarget}.</div>`;
                return;
            }

            audioSlots.forEach(slot => {
                const btn = document.createElement('button');
                btn.className = 'role-btn';
                btn.innerHTML = `
                    <div>${slot.id}</div>
                    <div class="role-id">Source ID: ${slot.source_id}</div>
                    <div class="role-icon">🎤</div>
                `;
                btn.onclick = () => assignRole(slot.source_id);
                roleList.appendChild(btn);
            });
        });

        function assignRole(id) {
            log(`[HANDSHAKE] Step 1: ROL SELECCIONADO (${id}) - PREPARANDO MICRO...`);
            mySourceId = id;
            roleOverlay.style.display = 'none';
            roleDisplay.innerText = id.toUpperCase();

            // Iniciar captura de audio inmediatamente para cumplir con gesto de seguridad
            initAudio();

            // Auto-Start (Source Push)
            isLive = true;
            statusText.innerText = "AUTO-STARTING...";
            statusText.style.color = "yellow";

            // initAudio -> startStream -> createOffer will handle the rest.
        }

        // 3. WebRTC Logic: Auto-Retry when Host appears
        socket.on('host_online', (data) => {
            if (isLive && mySourceId) {
                log("[HANDSHAKE] Host appeared! Resending offer...");
                createOffer();
            }
        });

        // 2. Audio Logic
        async function initAudio() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerText = "SECURITY ERROR: Context Restricted";
                alert("CRITICAL: Audio API blocked.\n\nSince Hangar Mesh runs on local network (HTTP), you MUST enable this flag in Chrome / Brave / Edge:\n\nchrome://flags/#unsafely-treat-insecure-origin-as-secure\n\nAnd add this server's IP and PORT to the list.");
                return;
            }
            try {
                statusText.innerText = "REQUESTING PERMISSION...";
                // First try standard permission
                await navigator.mediaDevices.getUserMedia({ audio: true });

                const devices = await navigator.mediaDevices.enumerateDevices();
                const mics = devices.filter(d => d.kind === 'audioinput');

                log("Mics found: " + mics.length);

                if (mics.length === 0) {
                    throw new Error("No audio input devices found in your system.");
                }

                micSelect.innerHTML = '';
                mics.forEach((d, idx) => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.text = d.label || `Mic ${idx + 1}`;
                    micSelect.appendChild(opt);
                });

                log(`[HANDSHAKE] Step 2: Permission Granted & Mics Found (${mics.length})`);
                // Start with the first one, but don't force 'ideal' if it might fail
                startStream(mics[0].deviceId);

            } catch (e) {
                console.error("Init Audio Error:", e);
                statusText.innerText = "MIC ERROR: " + e.message;
                statusText.style.color = "orange";
            }
        }

        async function startStream(deviceId) {
            try {
                // 1. Cleanup old stream and nodes
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                if (javascriptNode) {
                    javascriptNode.onaudioprocess = null;
                    javascriptNode.disconnect();
                }
                if (microphone) microphone.disconnect();
                if (analyser) analyser.disconnect();

                const constraints = {
                    audio: {
                        // Use 'exact' when the user manually selects a device to force the browser to switch
                        deviceId: deviceId ? { exact: deviceId } : undefined,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    },
                    video: false
                };

                log("Starting stream with constraints: " + JSON.stringify(constraints));
                localStream = await navigator.mediaDevices.getUserMedia(constraints);

                // VU Meter Logic
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') await audioContext.resume();

                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(localStream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function () {
                    var array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    var values = 0;
                    var length = array.length;
                    for (var i = 0; i < length; i++) { values += array[i]; }
                    var average = values / length;
                    vuLevel.style.height = Math.min(100, average * 2) + '%';
                }

                statusText.innerText = "READY";
                statusText.style.color = "#00f3ff";

                log("[HANDSHAKE] Step 3: Local Stream Created OK");
                // 2. Force renegotiation if already connected
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const audioSender = senders.find(s => s.track && s.track.kind === 'audio');
                    if (audioSender) {
                        log("Replacing track in existing connection...");
                        await audioSender.replaceTrack(localStream.getAudioTracks()[0]);
                    } else {
                        createOffer();
                    }
                } else {
                    createOffer();
                }

            } catch (e) {
                statusText.innerText = "STREAM ERROR: " + e.message;
                console.error("Stream Start Error:", e);
                // If 'exact' failed, try one more time without the constraint as fallback
                if (deviceId) {
                    console.warn("Exact deviceId failed, retrying with ideal...");
                    startStream(null);
                }
            }
        }

        // 3. WebRTC Logic
        async function createOffer() {
            if (peerConnection) peerConnection.close();

            peerConnection = new RTCPeerConnection(rtcConfig);
            // Add ONLY audio track
            const audioTrack = localStream.getAudioTracks()[0];
            peerConnection.addTrack(audioTrack, localStream);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('candidate', {
                        candidate: event.candidate,
                        target: `host_${currentTarget}`,
                        destSocketId: myDestSocketId,
                        from: socket.id
                    });
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                log(`[P2P] ICE State: ${peerConnection.iceConnectionState}`);
            };

            peerConnection.onconnectionstatechange = () => {
                log(`[P2P] Connection: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    statusText.innerText = "ON AIR";
                    statusText.style.color = "#ff0055";
                    log("P2P ESTABLISHED SUCCESSFULLY");
                }
            };

            let offer = await peerConnection.createOffer();

            // --- CALIDAD VDO.NINJA HACK (Alta fidelidad en audio) ---
            let sdp = offer.sdp;
            sdp = sdp.replace('useinbandfec=1', 'useinbandfec=1;stereo=1;maxaveragebitrate=510000;cbr=1');
            offer = new RTCSessionDescription({ type: 'offer', sdp: sdp });

            await peerConnection.setLocalDescription(offer);

            statusText.innerText = "SIGNALING...";
            statusText.style.color = "yellow";

            log("[HANDSHAKE] Step 3: ENVIANDO OFERTA P2P AL HOST");
            socket.emit('offer', {
                sdp: offer,
                type: 'audio',
                from: socket.id,
                sourceId: mySourceId,
                target: currentTarget,
                destSocketId: myDestSocketId
            });
        }

        // socket.on('request_offers') eliminado - El control es manual (Push)

        socket.on('answer', async (data) => {
            if (peerConnection) {
                log(`[HANDSHAKE] Step 4: RESPUESTA RECIBIDA - CONECTANDO... (${data.from})`);
                myDestSocketId = data.from; // Remember who answered
                await peerConnection.setRemoteDescription(data.sdp);
                statusText.innerText = "LINKING...";
                statusText.style.color = "cyan";
            }
        });

        socket.on('candidate', async (data) => {
            if (peerConnection) await peerConnection.addIceCandidate(data.candidate);
        });

    </script>
</body>

</html>
