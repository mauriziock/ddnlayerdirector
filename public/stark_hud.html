<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stark HUD Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap');

        :root {
            --primary: #00f3ff;
            --secondary: #005a60;
            --bg: rgba(5, 5, 16, 0);
            /* Transparent by default for Hangar Mesh */
            --warning: #ff9d00;
            --critical: #ff003c;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Chakra Petch', monospace;
            height: 100vh;
            width: 100vw;
            transition: background-color 0.5s;
        }

        /* --- STATE MODIFIERS --- */
        body.state-idle {
            --primary: #00f3ff;
        }

        body.state-warning {
            --primary: #ff9d00;
            --secondary: #5a3000;
        }

        body.state-critical {
            --primary: #ff003c;
            --secondary: #4a0010;
        }

        /* --- HUD FRAME --- */
        .hud-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CENTER RING */
        .arc-reactor {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid var(--secondary);
            border-radius: 50%;
            animation: spin 20s linear infinite;
            transition: border-color 0.5s;
        }

        body.state-warning .arc-reactor {
            animation-duration: 5s;
        }

        body.state-critical .arc-reactor {
            animation-duration: 0.5s;
            border-width: 4px;
        }

        .arc-inner {
            position: absolute;
            width: 360px;
            height: 360px;
            border: 4px dashed var(--primary);
            border-radius: 50%;
            animation: spin-rev 30s linear infinite;
            box-shadow: 0 0 20px var(--primary), inset 0 0 20px var(--primary);
            transition: all 0.5s;
        }

        /* GLITCH EFFECT OVERLAY */
        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: color-dodge;
            z-index: 99;
        }

        body.state-critical .glitch-overlay {
            animation: glitch-anim 0.2s infinite;
            opacity: 0.3;
        }

        body.trigger-glitch .glitch-overlay {
            animation: glitch-anim 0.1s infinite;
            opacity: 0.8;
        }

        .alert-box {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            padding: 30px 60px;
            border: 3px solid var(--primary);
            background: rgba(0, 0, 0, 0.95);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                opacity 0.3s;
            text-align: center;
            clip-path: polygon(10% 0, 100% 0, 100% 80%, 90% 100%, 0 100%, 0 20%);
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            min-width: 400px;
        }

        .alert-box.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .alert-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .alert-msg {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* UTILS */
        .status-text {
            position: absolute;
            bottom: 50px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-rev {
            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes glitch-anim {
            0% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
                background: rgba(255, 0, 0, 0.1);
            }

            40% {
                transform: translate(-2px, -2px);
            }

            60% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(2px, -2px);
                background: rgba(0, 255, 255, 0.1);
            }

            100% {
                transform: translate(0);
            }
        }
    </style>
</head>

<body class="state-idle">

    <div class="glitch-overlay"></div>

    <div class="hud-container">
        <div class="arc-reactor"></div>
        <div class="arc-inner"></div>

        <div class="status-text">SYSTEM ONLINE</div>

        <div id="alertBox" class="alert-box">
            <div class="alert-title">CAUTION</div>
            <div id="alertMsg" class="alert-msg">Unidentified visual parameter detected.</div>
        </div>
    </div>

    <script>
        // --- BRIDGE API ---
        const body = document.body;
        const statusText = document.querySelector('.status-text');
        const alertBox = document.getElementById('alertBox');
        const alertMsg = document.getElementById('alertMsg');
        let alertTimeout;

        window.horizon = {
            // Change persistent state
            scene: (sceneId, value) => {
                console.log("HUD Scene Change:", sceneId, value);

                const className = `state-${sceneId}`;
                if (value) {
                    body.classList.add(className);
                } else {
                    body.classList.remove(className);
                }

                // Update text based on scene (if activating)
                if (value) {
                    if (sceneId === 'idle') statusText.innerText = "SYSTEM ONLINE";
                    else if (sceneId === 'warning') statusText.innerText = "SECTOR WARNING";
                    else if (sceneId === 'critical') statusText.innerText = "CRITICAL FAILURE";
                    else if (sceneId === 'live') statusText.innerText = "SIGNAL LIVE";
                    else if (sceneId === 'brb') statusText.innerText = "TRANSMISSION PAUSED";
                } else {
                    // If we deactivated a state, and no other critical/warning is on, back to idle?
                    // Simple logic: if nothing else is major, reset text if this was the active text
                    const currentMajor = body.classList.contains('state-critical') ? 'CRITICAL FAILURE' :
                        (body.classList.contains('state-warning') ? 'SECTOR WARNING' : 'SYSTEM ONLINE');
                    statusText.innerText = currentMajor;
                }
            },

            // Fire temporary event
            trigger: (effectId, payload) => {
                console.log("HUD Trigger:", effectId, payload);

                if (effectId === 'glitch_burst' || effectId === 'glitch') {
                    body.classList.add('trigger-glitch');
                    setTimeout(() => body.classList.remove('trigger-glitch'), 500);
                }

                if (effectId === 'system_alert' || effectId === 'alert') {
                    const text = (typeof payload === 'string' ? payload : payload?.message) || "CRITICAL SYSTEM ALERT";
                    alertMsg.innerText = text;
                    alertBox.classList.add('active');

                    clearTimeout(alertTimeout);
                    alertTimeout = setTimeout(() => {
                        alertBox.classList.remove('active');
                    }, 6000);
                }
            }
        };

        // Listen for messages from Hangar Host
        window.addEventListener('message', (e) => {
            const data = e.data;
            if (!data || !data.type) return;

            if (data.type === 'scene_state' || data.type === 'state_change') {
                window.horizon.scene(data.key, data.value);
            } else if (data.type === 'trigger_state') {
                // value is boolean, we only trigger on true
                if (data.value) {
                    window.horizon.trigger(data.key, data.payload);
                }
            }
        });

        console.log("Stark HUD Bridge Initialized");
    </script>
</body>

</html>
