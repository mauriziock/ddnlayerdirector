<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hangar 89: Dirty Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff;
            --cyan-dim: rgba(0, 243, 255, 0.1);
            --red: #ff3333;
            --purple: #b537f2;
            --purple-dim: rgba(181, 55, 242, 0.15);
            --bg-grid: rgba(0, 243, 255, 0.02);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            text-transform: uppercase;
            color: var(--cyan);
        }

        /* --- 1. CYBERWORLD BACKGROUND --- */
        .cyber-world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                    rgba(10, 10, 20, 0.9) 0%,
                    rgba(181, 55, 242, 0.4) 40%,
                    rgba(0, 243, 255, 0.4) 60%,
                    rgba(10, 10, 20, 0.9) 100%);
            background-size: 400% 400%;
            animation: synth-flow 15s ease infinite;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes synth-flow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .horizon-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 40%;
            background: radial-gradient(ellipse at center,
                    rgba(181, 55, 242, 0.2) 0%,
                    rgba(0, 243, 255, 0.05) 50%,
                    transparent 100%);
            filter: blur(100px);
            animation: glow-pulse 8s infinite alternate;
        }

        .perspective-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%;
            perspective: 400px;
            perspective-origin: 50% 0%;
        }

        .moving-grid {
            position: absolute;
            width: 300%;
            height: 400%;
            top: 0;
            left: -100%;
            background-image:
                linear-gradient(to right, var(--cyan-dim) 2px, transparent 2px),
                linear-gradient(to bottom, var(--purple-dim) 2px, transparent 2px);
            background-size: 100px 100px;
            transform: rotateX(75deg);
            transform-origin: top center;
            animation: grid-advance 3s linear infinite;
            filter: drop-shadow(0 0 5px var(--purple));
        }

        @keyframes grid-advance {
            0% {
                transform: rotateX(75deg) translateY(0);
            }

            100% {
                transform: rotateX(75deg) translateY(80px);
            }
        }

        @keyframes glow-pulse {
            0% {
                opacity: 0.4;
                transform: translateX(-50%) scale(1);
            }

            100% {
                opacity: 0.8;
                transform: translateX(-50%) scale(1.2);
            }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    transparent 50%,
                    rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.4;
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
            z-index: 6;
            animation: crt-flicker 0.1s infinite;
        }

        @keyframes crt-flicker {
            0% {
                opacity: 0.9;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.95;
            }
        }

        /* --- 2. GENERADOR DE BASURA (SCATTERED NOISE) --- */
        /* Contenedor para elementos flotantes aleatorios */
        #debris-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            /* Detrás de la cámara */
        }

        .junk-data {
            position: absolute;
            font-size: 0.8rem;
            color: rgba(0, 243, 255, 0.4);
            user-select: none;
        }

        .tiny-cross {
            position: absolute;
            width: 10px;
            height: 10px;
        }

        .tiny-cross::before,
        .tiny-cross::after {
            content: '';
            position: absolute;
            background: rgba(0, 243, 255, 0.3);
        }

        .tiny-cross::before {
            top: 4px;
            left: 0;
            width: 100%;
            height: 2px;
        }

        .tiny-cross::after {
            left: 4px;
            top: 0;
            height: 100%;
            width: 2px;
        }

        /* --- 3. GLITCH EFFECTS (AGGRESSIVE) --- */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(38px, 9999px, 2px, 0);
                transform: skew(0.35deg);
            }

            5% {
                clip: rect(19px, 9999px, 60px, 0);
                transform: skew(0.66deg);
            }

            10% {
                clip: rect(10px, 9999px, 78px, 0);
                transform: skew(0.81deg);
            }

            15% {
                clip: rect(74px, 9999px, 79px, 0);
                transform: skew(0.31deg);
            }

            20% {
                clip: rect(82px, 9999px, 45px, 0);
                transform: skew(0.01deg);
            }

            25% {
                clip: rect(3px, 9999px, 57px, 0);
                transform: skew(0.79deg);
            }

            30% {
                clip: rect(53px, 9999px, 82px, 0);
                transform: skew(0.37deg);
            }

            35% {
                clip: rect(89px, 9999px, 1px, 0);
                transform: skew(0.66deg);
            }

            40% {
                clip: rect(28px, 9999px, 4px, 0);
                transform: skew(0.41deg);
            }

            45% {
                clip: rect(31px, 9999px, 82px, 0);
                transform: skew(0.95deg);
            }

            50% {
                clip: rect(74px, 9999px, 32px, 0);
                transform: skew(0.78deg);
            }

            55% {
                clip: rect(1px, 9999px, 3px, 0);
                transform: skew(0.95deg);
            }

            60% {
                clip: rect(4px, 9999px, 100px, 0);
                transform: skew(0.12deg);
            }

            65% {
                clip: rect(7px, 9999px, 37px, 0);
                transform: skew(0.79deg);
            }

            70% {
                clip: rect(29px, 9999px, 60px, 0);
                transform: skew(0.85deg);
            }

            75% {
                clip: rect(35px, 9999px, 96px, 0);
                transform: skew(0.07deg);
            }

            80% {
                clip: rect(93px, 9999px, 32px, 0);
                transform: skew(0.57deg);
            }

            85% {
                clip: rect(39px, 9999px, 55px, 0);
                transform: skew(0.19deg);
            }

            90% {
                clip: rect(89px, 9999px, 88px, 0);
                transform: skew(0.7deg);
            }

            95% {
                clip: rect(82px, 9999px, 99px, 0);
                transform: skew(0.88deg);
            }

            100% {
                clip: rect(1px, 9999px, 5px, 0);
                transform: skew(0.03deg);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(30px, 9999px, 64px, 0);
                transform: skew(0.66deg);
            }

            5% {
                clip: rect(72px, 9999px, 48px, 0);
                transform: skew(0.18deg);
            }

            10% {
                clip: rect(27px, 9999px, 41px, 0);
                transform: skew(0.09deg);
            }

            15% {
                clip: rect(59px, 9999px, 44px, 0);
                transform: skew(0.07deg);
            }

            20% {
                clip: rect(96px, 9999px, 5px, 0);
                transform: skew(0.15deg);
            }

            25% {
                clip: rect(17px, 9999px, 36px, 0);
                transform: skew(0.02deg);
            }

            30% {
                clip: rect(2px, 9999px, 27px, 0);
                transform: skew(0.13deg);
            }

            35% {
                clip: rect(51px, 9999px, 12px, 0);
                transform: skew(0.96deg);
            }

            40% {
                clip: rect(34px, 9999px, 86px, 0);
                transform: skew(0.13deg);
            }

            45% {
                clip: rect(21px, 9999px, 90px, 0);
                transform: skew(0.96deg);
            }

            50% {
                clip: rect(25px, 9999px, 12px, 0);
                transform: skew(0.84deg);
            }

            55% {
                clip: rect(34px, 9999px, 34px, 0);
                transform: skew(0.79deg);
            }

            60% {
                clip: rect(21px, 9999px, 48px, 0);
                transform: skew(0.2deg);
            }

            65% {
                clip: rect(35px, 9999px, 100px, 0);
                transform: skew(0.99deg);
            }

            70% {
                clip: rect(12px, 9999px, 20px, 0);
                transform: skew(0.61deg);
            }

            75% {
                clip: rect(41px, 9999px, 73px, 0);
                transform: skew(0.29deg);
            }

            80% {
                clip: rect(25px, 9999px, 20px, 0);
                transform: skew(0.55deg);
            }

            85% {
                clip: rect(15px, 9999px, 30px, 0);
                transform: skew(0.39deg);
            }

            90% {
                clip: rect(37px, 9999px, 86px, 0);
                transform: skew(0.25deg);
            }

            95% {
                clip: rect(98px, 9999px, 41px, 0);
                transform: skew(0.6deg);
            }

            100% {
                clip: rect(62px, 9999px, 14px, 0);
                transform: skew(0.12deg);
            }
        }

        .glitch-char {
            display: inline-block;
            animation: text-flicker 0.1s infinite alternate;
        }

        .severe-glitch {
            animation: text-skew 0.1s infinite;
            color: var(--red);
            font-weight: bold;
            text-shadow: 2px 0 var(--cyan), -2px 0 #ff0;
        }

        @keyframes text-flicker {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            10% {
                opacity: 0.1;
                transform: translateX(5px) scaleY(1.5);
            }

            20% {
                opacity: 1;
                transform: translateX(-5px) skewX(20deg);
            }

            30% {
                opacity: 0.8;
                transform: translateX(0);
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes text-skew {
            0% {
                transform: skew(0deg) translateX(0);
            }

            10% {
                transform: skew(-30deg) translateX(-5px);
            }

            20% {
                transform: skew(30deg) translateX(5px);
            }

            30% {
                transform: skew(-10deg) scaleX(1.1);
            }

            40% {
                transform: skew(0deg);
            }

            100% {
                transform: skew(0deg);
            }
        }

        /* --- 4. RADIO CONSOLE STRUCTURE --- */
        .main-console {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 96vw;
            height: 92vh;
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
            z-index: 10;
        }

        /* Branding Header */
        .console-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--cyan-dim);
            padding: 10px 0;
            background: linear-gradient(to right, rgba(0, 243, 255, 0.05), transparent);
        }

        .branding-group {
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .station-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 0 20px var(--cyan);
            color: var(--cyan);
        }

        .sub-brand {
            font-size: 1.2rem;
            color: var(--purple);
            border: 1px solid var(--purple);
            padding: 2px 10px;
            background: var(--purple-dim);
        }

        .frequency-tag {
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-left: 4px solid var(--red);
            color: var(--red);
            font-weight: bold;
        }

        /* Player Slot & Metadata */
        .player-slot {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--cyan-dim);
            display: flex;
            align-items: center;
            padding: 40px;
            gap: 30px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            box-shadow: inset 0 0 100px rgba(0, 243, 255, 0.05);
        }

        .art-container {
            width: 180px;
            height: 180px;
            border: 1px solid var(--cyan);
            padding: 5px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            background: #000;
            flex-shrink: 0;
            z-index: 5;
        }

        #art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .metadata {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
            flex-grow: 1;
        }

        .track-name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            letter-spacing: -1px;
        }

        .artist-name {
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: 4px;
            font-weight: bold;
            opacity: 0.8;
        }

        /* Stream Animation (Avicii style) */
        .viz-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            overflow: hidden;
            opacity: 0.4;
            pointer-events: none;
        }

        .stream-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
            width: 100%;
            filter: blur(1px);
        }

        .l1 {
            animation: stream-anim 2s infinite linear;
            bottom: 10px;
            opacity: 0.8;
        }

        .l2 {
            animation: stream-anim 4s infinite linear reverse;
            bottom: 25px;
            opacity: 0.4;
        }

        .l3 {
            animation: stream-anim 1.5s infinite linear;
            bottom: 40px;
            opacity: 0.6;
            height: 1px;
        }

        @keyframes stream-anim {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Terminal Style for AI Facts */
        .terminal-block {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid var(--accent);
            min-height: 100px;
            font-size: 0.9rem;
            line-height: 1.4;
            color: rgba(0, 243, 255, 0.8);
            position: relative;
            overflow: hidden;
        }

        .terminal-block::before {
            content: 'AI_ANALYST_v2.0';
            display: block;
            font-size: 0.6rem;
            color: var(--accent);
            opacity: 0.5;
            margin-bottom: 5px;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--accent);
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Side Panel: Camera and Stats */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .camera-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(0, 243, 255, 0.5);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        /* Reuse corners for camera-frame */
        .cc-tl {
            top: -1px;
            left: -1px;
            border-width: 4px 0 0 4px;
        }

        .cc-tr {
            top: -1px;
            right: -1px;
            border-width: 4px 4px 0 0;
        }

        .cc-bl {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 4px 4px;
        }

        .cc-br {
            bottom: -1px;
            right: -1px;
            border-width: 0 4px 4px 0;
        }

        .cam-id {
            position: absolute;
            top: 5px;
            left: 5px;
            color: var(--cyan);
            font-weight: 800;
            padding: 2px 5px;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--cyan);
            z-index: 15;
            background: rgba(0, 0, 0, 0.4);
        }

        .cam-overlay-info {
            position: absolute;
            bottom: 5px;
            left: 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 15;
        }

        .status-stack {
            display: flex;
            gap: 5px;
            z-index: 20;
        }

        .cam-name {
            font-size: 0.6rem;
            background: var(--cyan);
            color: #000;
            padding: 1px 4px;
            width: fit-content;
        }

        .cam-time-block {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            border-left: 2px solid var(--red);
            font-size: 0.6rem;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        /* Visualizer */
        .visualizer-container {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 60px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--cyan-dim);
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .vis-bar {
            flex: 1;
            background: var(--cyan);
            animation: bar-surge 0.5s infinite alternate ease-in-out;
            box-shadow: 0 0 10px var(--cyan);
        }

        /* FM Tuner Bar */
        .tuner-container {
            grid-column: 1 / -1;
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--purple-dim);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 0.7rem;
            color: var(--purple);
            letter-spacing: 2px;
        }

        .tuner-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: var(--red);
            box-shadow: 0 0 10px var(--red);
            z-index: 5;
            animation: tuner-drift 10s infinite alternate ease-in-out;
        }

        .tuner-marks {
            width: 200%;
            height: 100%;
            background-image: linear-gradient(to right, var(--purple-dim) 1px, transparent 1px);
            background-size: 20px 100%;
            opacity: 0.5;
        }

        @keyframes tuner-drift {
            from {
                left: 40%;
            }

            to {
                left: 60%;
            }
        }

        @keyframes bar-surge {
            0% {
                height: 20%;
                opacity: 0.4;
            }

            50% {
                height: 80%;
                opacity: 0.8;
            }

            100% {
                height: 40%;
                opacity: 0.6;
            }
        }

        /* SPINE and Status in console layout */
        .spine {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .data-row {
            margin-bottom: 10px;
            border-left: 2px solid var(--cyan-dim);
            padding-left: 8px;
        }

        .d-val {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .d-lbl {
            font-size: 0.7rem;
            color: rgba(0, 243, 255, 0.5);
        }

        /* Columna HEX Derecha (Sacrificable) */
        .hex-rain {
            position: absolute;
            top: 5%;
            bottom: 5%;
            right: 5px;
            font-size: 8px;
            line-height: 10px;
            color: rgba(0, 243, 255, 0.15);
            text-align: right;
            width: 40px;
            overflow: hidden;
            pointer-events: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        /* --- 5. SENSOR NOISE / FILM GRAIN GENERATOR --- */
        .sensor-grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            /* ENCIMA DE TODO, INCLUIDA LA CÁMARA */
            opacity: 0.12;
            /* Ajusta esto: 0.05 es sutil, 0.15 es cámara de seguridad vieja */
            background: transparent;
            overflow: hidden;
        }

        .sensor-grain::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
            background-size: 150px 150px;
            /* Tamaño del grano */
            mix-blend-mode: overlay;
            /* Fusión crítica para que parezca ruido de sensor */
            animation: grain-shift 0.5s steps(3) infinite;
        }

        @keyframes grain-shift {
            0% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-5%, -5%);
            }

            20% {
                transform: translate(-10%, 5%);
            }

            30% {
                transform: translate(5%, -10%);
            }

            40% {
                transform: translate(-5%, 15%);
            }

            50% {
                transform: translate(-10%, 5%);
            }

            60% {
                transform: translate(15%, 0);
            }

            70% {
                transform: translate(0, 10%);
            }

            80% {
                transform: translate(-15%, 0);
            }

            90% {
                transform: translate(10%, 5%);
            }

            100% {
                transform: translate(5%, 0);
            }
        }
    </style>
</head>

<body>
    <div class="sensor-grain"></div>

    <div class="cyber-world">
        <div class="horizon-glow"></div>
        <div class="perspective-container">
            <div class="moving-grid"></div>
        </div>
        <div class="scanlines"></div>
        <div class="crt-overlay"></div>
    </div>
    <div id="debris-layer"></div>
    <div class="hex-rain" id="hex"></div>

    <div class="main-console">
        <!-- Header: Branding and Frequency -->
        <header class="console-header">
            <div class="branding-group">
                <div class="station-title glitch-text" data-text="DRIFTERS DEN">DRIFTERS DEN</div>
                <div class="sub-brand glitch-text" data-text="DDN MX">DDN MX</div>
            </div>
            <div class="frequency-tag">89.0 MHz DRIFT</div>
        </header>

        <!-- Left: Radio Player -->
        <main class="player-slot">
            <div class="art-container">
                <img id="art" src="" alt="Album Art">
            </div>

            <div class="metadata">
                <div id="track" class="track-name">SISTEMA INICIADO</div>
                <div id="artist" class="artist-name">ESPERANDO SEÑAL...</div>

                <div class="live-tag"
                    style="position: relative; top: 10px; border: 1px solid var(--red); width: fit-content; padding: 2px 8px; color: var(--red); font-size: 0.7rem; letter-spacing: 2px;">
                    <span class="rec-dot"
                        style="display: inline-block; vertical-align: middle; margin-right: 5px;"></span>
                    STREAM_CONNECTED
                </div>

                <div class="terminal-block">
                    <div id="ai-facts">ESPERANDO ANÁLISIS SÓNICO...</div>
                    <span id="ai-cursor" class="typewriter-cursor"></span>
                </div>
            </div>

            <!-- Stream Animations -->
            <div class="viz-container">
                <div class="stream-line l1"></div>
                <div class="stream-line l2"></div>
                <div class="stream-line l3"></div>
            </div>
        </main>

        <!-- Right: Camera and Stats -->
        <aside class="side-panel">
            <div class="camera-frame">
                <div class="c-corner cc-tl"></div>
                <div class="c-corner cc-tr"></div>
                <div class="c-corner cc-bl"></div>
                <div class="c-corner cc-br"></div>

                <div class="cam-id">HANGAR CAM 02</div>

                <div class="cam-overlay-info">
                    <div class="cam-name">HANGAR CAM 02</div>
                    <div class="cam-time-block">
                        <div class="rec-dot"></div>
                        <div id="clock">00:00:00</div>
                    </div>
                </div>

                <div class="status-stack" style="position: absolute; top: 5px; right: 5px; bottom: auto;">
                    <div class="status-badge st-live" style="font-size: 0.5rem; padding: 2px 6px;">LIVE_MESH</div>
                </div>
            </div>

            <div class="visualizer-container" id="visualizer">
                <!-- Bars generated by script or static -->
                <div class="vis-bar" style="animation-delay: 0.1s"></div>
                <div class="vis-bar" style="animation-delay: 0.3s"></div>
                <div class="vis-bar" style="animation-delay: 0.2s"></div>
                <div class="vis-bar" style="animation-delay: 0.5s"></div>
                <div class="vis-bar" style="animation-delay: 0.4s"></div>
                <div class="vis-bar" style="animation-delay: 0.6s"></div>
                <div class="vis-bar" style="animation-delay: 0.2s"></div>
            </div>

            <div class="spine">
                <div class="data-row">
                    <div class="d-lbl">BITRATE</div>
                    <div class="d-val severe-glitch" style="font-size: 1rem;">9.4 MBPS</div>
                </div>
                <div class="data-row">
                    <div class="d-lbl">SIGNAL</div>
                    <div class="d-val" style="color:var(--cyan); font-size: 1rem;">STABLE</div>
                </div>
            </div>
        </aside>

        <!-- Bottom: Tuner Bar -->
        <footer class="tuner-container">
            <div class="tuner-line"></div>
            <div class="tuner-marks"></div>
            <div style="position: absolute; left: 10px;">88.0</div>
            <div style="position: absolute; left: 25%;">92.5</div>
            <div style="position: absolute; left: 50%; color: var(--cyan); font-weight: bold;">89.0 DRIFT</div>
            <div style="position: absolute; left: 75%;">102.1</div>
            <div style="position: absolute; right: 10px;">108.0</div>
        </footer>
    </div>

    <script>
        // 1. Reloj con segundero
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }, 1000);

        // 2. Hex Rain
        const hexDiv = document.getElementById('hex');
        function rain() {
            let s = '';
            for (let i = 0; i < 60; i++) s += (Math.random() > 0.5 ? '1' : '0') + 'X' + Math.floor(Math.random() * 99) + '<br>';
            hexDiv.innerHTML = s;
        }
        setInterval(rain, 200);

        // 3. GENERADOR DE BASURA ESPACIAL (DEBRIS)
        const debrisLayer = document.getElementById('debris-layer');
        const trashTexts = ['ERR_01', 'NULL', '0x4F', ':::', '///', 'NO_SIGNAL', 'PKT_LOSS', '+', '└'];

        function spawnDebris() {
            debrisLayer.innerHTML = '';
            const w = window.innerWidth;
            const h = window.innerHeight;

            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                if (Math.random() > 0.3) {
                    el.className = 'junk-data';
                    el.innerText = trashTexts[Math.floor(Math.random() * trashTexts.length)];
                    if (Math.random() > 0.8) el.classList.add('glitch-char');
                } else {
                    el.className = 'tiny-cross';
                }

                // Posición aleatoria basada en viewport real
                const x = Math.random() * w;
                const y = Math.random() * h;

                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.opacity = (Math.random() * 0.3 + 0.1);

                debrisLayer.appendChild(el);
            }
        }

        setInterval(spawnDebris, 4000);
        spawnDebris();

        // 4. LAST.FM NOW PLAYING LOGIC
        const LASTFM_CONFIG = {
            apiKey: '3c93be4fddcf1fef5e080971b8115cd9',
            user: 'mauriziock',
            pollInterval: 5000
        };

        const playerElements = {
            art: document.getElementById('art'),
            track: document.getElementById('track'),
            artist: document.getElementById('artist')
        };

        let lastTrackTitle = '';

        async function updateRadioPlayer() {
            try {
                // Fetch config first to get user
                const configRes = await fetch('/api/config');
                const config = await configRes.json();
                const user = config.lastfmUser || LASTFM_CONFIG.user;

                const response = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${user}&api_key=${LASTFM_CONFIG.apiKey}&format=json&limit=1`);
                const data = await response.json();

                if (!data.recenttracks || !data.recenttracks.track.length) return;

                const track = data.recenttracks.track[0];
                const isPlaying = (track['@attr'] && track['@attr'].nowplaying === 'true');

                if (isPlaying) {
                    const title = track.name;
                    const artist = track.artist['#text'];
                    const img = track.image[3]['#text'] || track.image[2]['#text'];

                    if (lastTrackTitle !== title) {
                        lastTrackTitle = title;
                        playerElements.track.textContent = title;
                        playerElements.artist.textContent = artist;
                        if (img) playerElements.art.src = img;

                        // NEW: Fetch AI Facts
                        fetchAIFacts(artist, title);
                    }
                }
            } catch (err) {
                console.error("Radio Player Error:", err);
            }
        }

        async function fetchAIFacts(artist, track) {
            const aiText = document.getElementById('ai-facts');
            aiText.textContent = '> ANALIZANDO SEÑAL...';
            try {
                const res = await fetch(`/api/track-info?artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}`);
                if (res.ok) {
                    const data = await res.json();
                    const factsText = data.facts.join(' | ');
                    typewriter(factsText, 'ai-facts');
                } else {
                    const err = await res.json();
                    aiText.textContent = `> ERROR: ${err.error || 'AI_OFFLINE'}`;
                    console.error("AI Error Response:", err);
                }
            } catch (e) {
                aiText.textContent = '> ERROR: CONNECTION_LOST';
                console.error("AI Fetch error:", e);
            }
        }

        function typewriter(text, elementId) {
            const el = document.getElementById(elementId);
            el.textContent = '> ';
            let i = 0;
            const speed = 40;

            function type() {
                if (i < text.length) {
                    el.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        setInterval(updateRadioPlayer, LASTFM_CONFIG.pollInterval);
        updateRadioPlayer();
    </script>
</body>

</html>
