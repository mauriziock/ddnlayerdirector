<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hangar 89: Dirty Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff;
            --cyan-dim: rgba(0, 243, 255, 0.1);
            --red: #ff3333;
            --bg-grid: rgba(0, 243, 255, 0.02);
        }

        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            text-transform: uppercase;
            color: var(--cyan);
        }

        /* --- 1. FONDO Y GRILLA --- */
        .tactical-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* --- 2. GENERADOR DE BASURA (SCATTERED NOISE) --- */
        /* Contenedor para elementos flotantes aleatorios */
        #debris-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            /* Detrás de la cámara */
        }

        .junk-data {
            position: absolute;
            font-size: 0.8rem;
            color: rgba(0, 243, 255, 0.4);
            user-select: none;
        }

        .tiny-cross {
            position: absolute;
            width: 10px;
            height: 10px;
        }

        .tiny-cross::before,
        .tiny-cross::after {
            content: '';
            position: absolute;
            background: rgba(0, 243, 255, 0.3);
        }

        .tiny-cross::before {
            top: 4px;
            left: 0;
            width: 100%;
            height: 2px;
        }

        .tiny-cross::after {
            left: 4px;
            top: 0;
            height: 100%;
            width: 2px;
        }

        /* --- 3. GLITCH EFFECTS --- */
        .glitch-char {
            display: inline-block;
            animation: text-flicker 3s infinite alternate;
        }

        .severe-glitch {
            animation: text-skew 0.5s infinite;
            color: var(--red);
            font-weight: bold;
        }

        @keyframes text-flicker {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            5% {
                opacity: 0.1;
                transform: translateX(2px);
            }

            10% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes text-skew {
            0% {
                transform: skew(0deg);
            }

            20% {
                transform: skew(-20deg);
            }

            40% {
                transform: skew(10deg);
            }

            60% {
                transform: skew(-5deg);
            }

            80% {
                transform: skew(5deg);
            }
        }

        /* --- 4. ESTRUCTURA PRINCIPAL (REPOSITIVA) --- */

        /* STATUS STACK: Bajado a px 480 para dar espacio al player arriba */
        .status-stack {
            position: absolute;
            top: 25vh;
            /* Proporcional al alto */
            left: 5vw;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .status-badge {
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 2px 8px;
            border: 1px solid;
            backdrop-filter: blur(2px);
        }

        .st-rec {
            border-color: var(--red);
            color: var(--red);
            animation: pulse 2s infinite;
        }

        .st-live {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* CAMERA FRAME: Ahora usa porcentajes para el ancho */
        .camera-frame {
            position: absolute;
            top: 28vh;
            left: 5vw;
            width: 90vw;
            aspect-ratio: 16 / 9;
            /* Mantiene la forma pase lo que pase */
            border: 1px solid rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
            z-index: 10;
        }

        /* Esquinas técnicas */
        .c-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border-color: var(--cyan);
            border-style: solid;
        }

        .cc-tl {
            top: -1px;
            left: -1px;
            border-width: 4px 0 0 4px;
        }

        .cc-tr {
            top: -1px;
            right: -1px;
            border-width: 4px 4px 0 0;
        }

        .cc-bl {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 4px 4px;
        }

        .cc-br {
            bottom: -1px;
            right: -1px;
            border-width: 0 4px 4px 0;
        }

        .cam-id {
            position: absolute;
            bottom: -25px;
            right: 0;
            background: var(--cyan);
            color: #000;
            font-weight: 800;
            padding: 2px 15px;
            font-size: 1.2rem;
        }

        /* DATA SPINE (Debajo de cámara) */
        .spine {
            position: absolute;
            top: 55vh;
            /* Debajo del frame de la cámara */
            left: 5vw;
            width: 60vw;
        }

        .data-row {
            margin-bottom: 10px;
            border-left: 2px solid var(--cyan-dim);
            padding-left: 8px;
        }

        .d-val {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .d-lbl {
            font-size: 0.7rem;
            color: rgba(0, 243, 255, 0.5);
        }

        /* Columna HEX Derecha (Sacrificable) */
        .hex-rain {
            position: absolute;
            top: 5%;
            bottom: 5%;
            right: 5px;
            font-size: 8px;
            line-height: 10px;
            color: rgba(0, 243, 255, 0.15);
            text-align: right;
            width: 40px;
            overflow: hidden;
            pointer-events: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }
    </style>
</head>

<body>

    <div class="tactical-grid"></div>
    <div id="debris-layer"></div>
    <div class="hex-rain" id="hex"></div>

    <div class="status-stack">
        <div class="status-badge st-live">STREAMING</div>
        <div class="status-badge st-rec">● REC</div>
    </div>

    <div class="camera-frame">
        <div class="c-corner cc-tl"></div>
        <div class="c-corner cc-tr"></div>
        <div class="c-corner cc-bl"></div>
        <div class="c-corner cc-br"></div>

        <div class="cam-id">
            HAN<span class="glitch-char">G</span>AR <span class="glitch-char">8</span>9
        </div>
    </div>

    <div class="spine">
        <div class="data-row">
            <div class="d-lbl">SYS_TIME</div>
            <div class="d-val" id="clock">00:00</div>
        </div>
        <div class="data-row">
            <div class="d-lbl">INTEGRITY</div>
            <div class="d-val" style="color:var(--cyan)">98<span class="severe-glitch">%</span></div>
        </div>
    </div>

    <script>
        // 1. Reloj
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // 2. Hex Rain
        const hexDiv = document.getElementById('hex');
        function rain() {
            let s = '';
            for (let i = 0; i < 60; i++) s += (Math.random() > 0.5 ? '1' : '0') + 'X' + Math.floor(Math.random() * 99) + '<br>';
            hexDiv.innerHTML = s;
        }
        setInterval(rain, 200);

        // 3. GENERADOR DE BASURA ESPACIAL (DEBRIS)
        const debrisLayer = document.getElementById('debris-layer');
        const trashTexts = ['ERR_01', 'NULL', '0x4F', ':::', '///', 'NO_SIGNAL', 'PKT_LOSS', '+', '└'];

        function spawnDebris() {
            debrisLayer.innerHTML = '';
            const w = window.innerWidth;
            const h = window.innerHeight;

            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                if (Math.random() > 0.3) {
                    el.className = 'junk-data';
                    el.innerText = trashTexts[Math.floor(Math.random() * trashTexts.length)];
                    if (Math.random() > 0.8) el.classList.add('glitch-char');
                } else {
                    el.className = 'tiny-cross';
                }

                // Posición aleatoria basada en viewport real
                const x = Math.random() * w;
                const y = Math.random() * h;

                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.opacity = (Math.random() * 0.3 + 0.1);

                debrisLayer.appendChild(el);
            }
        }

        setInterval(spawnDebris, 4000);
        spawnDebris();
    </script>
</body>

</html>
