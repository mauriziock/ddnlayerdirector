<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar Devices Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f3ff;
            --bg: #0a0a0b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (CasaOS Style) */
        nav {
            width: 70px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 100;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
            color: #666;
            text-decoration: none;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* MAIN CONTENT */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 0;
        }

        /* DEVICE GRID (Glassmorphism Cards) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .device-icon {
            width: 45px;
            height: 45px;
            background: rgba(0, 243, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--accent);
        }

        .card h3 {
            margin: 0;
            font-size: 18px;
            color: #fff;
        }

        .card p {
            margin: 5px 0 0;
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }

        .stream-status {
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
        }

        /* RTSP Copy Field */
        .rtsp-copy-box {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rtsp-copy-box input {
            flex-grow: 1;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 11px;
            font-family: monospace;
            outline: none;
            width: 100%;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: var(--accent);
        }


        /* MODAL */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #151517;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        /* LOG TERMINAL */
        #log-terminal {
            margin-top: 40px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            height: 200px;
            overflow-y: auto;
            color: #888;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .log-entry {
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .log-time {
            color: #444;
            margin-right: 8px;
        }

        .log-info {
            color: #00f3ff;
        }

        .log-success {
            color: #0f0;
        }

        .log-error {
            color: #f44;
        }

        .log-warn {
            color: #ff0;
        }
    </style>

</head>

<body>

    <nav>
        <a href="/admin.html" class="nav-item" title="Director">
            <svg viewBox="0 0 24 24">
                <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
        </a>
        <a href="/programs.html" class="nav-item" title="Programs">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,18.54L19.37,12.8L21,14.07L12,21.07L3,14.07L4.62,12.81L12,18.54M12,16L3,9L12,2L21,9L12,16Z" />
            </svg>
        </a>
        <a href="/devices.html" class="nav-item active" title="Devices Hub">
            <svg viewBox="0 0 24 24">
                <path
                    d="M4,6H20V16H4M20,18A2,2 0 0,0 22,16V6C22,4.89 21.1,4 20,4H4C2.89,4 2,4.89 2,6V16A2,2 0 0,0 4,18H0V20H24V18H20Z" />
            </svg>
        </a>
    </nav>

    <main>
        <header>
            <h1>Devices Hub</h1>
            <div style="display:flex; gap:10px;">
                <button id="btn-sync" class="btn" onclick="syncDevices()">🔄 SYNC DEVICES</button>
                <button class="btn btn-add" onclick="openModal()">+ NEW DEVICE</button>
            </div>
        </header>


        <div id="grid" class="grid">
            <!-- Cards will be injected here -->
        </div>

        <div id="log-terminal">
            <div class="log-entry"><span class="log-time">[System]</span> <span class="log-info">Debug console ready.
                    Monitoring device synchronization...</span></div>
        </div>
    </main>


    <div id="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Register New Device</h2>

            <div class="form-group">
                <label>FRIENDLY NAME</label>
                <input type="text" id="dev-name" placeholder="e.g. Studio Cam 1">
            </div>

            <div class="form-group">
                <label>DEVICE TYPE</label>
                <select id="dev-type" onchange="updateForm()">
                    <option value="onvif_video">ONVIF Camera (RTSP)</option>
                    <option value="srt_video">SRT Stream (Listener)</option>
                </select>
            </div>

            <div class="form-group">
                <label>SOURCE ID / STREAM KEY</label>
                <input type="text" id="dev-source-id" placeholder="e.g. studio_cam">
                <div style="font-size:10px; color:#666; margin-top:5px;">This is the unique internal ID.</div>
            </div>

            <div class="form-group" id="field-url">
                <label>RTSP STREAM URL</label>
                <input type="text" id="dev-url" placeholder="rtsp://admin:pass@192.168.1.10:554/stream">
            </div>

            <div style="display:flex; justify-content:flex-end; gap: 10px; margin-top:30px;">
                <button class="btn" onclick="closeModal()">CANCEL</button>
                <button class="btn btn-add" onclick="saveDevice()">REGISTER DEVICE</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let devices = [];
        let streams = {}; // Go2RTC Live Status

        function addLog(msg, type = 'info') {
            const term = document.getElementById('log-terminal');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${msg}</span>`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }


        function updateForm() {
            const type = document.getElementById('dev-type').value;
            const urlField = document.getElementById('field-url');

            if (type === 'onvif_video') {
                urlField.style.display = 'block';
            } else {
                urlField.style.display = 'none';
            }
        }

        async function fetchAll() {
            try {
                // 1. Get our defined devices
                const dRes = await fetch('/api/devices');
                devices = await dRes.json();

                // 2. Get live status from Go2RTC
                const sRes = await fetch('/api/streams');
                streams = await sRes.json();

                renderDevices();
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        function renderDevices() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            devices.forEach(dev => {
                const card = document.createElement('div');
                card.className = 'card';

                let icon = '📷';
                if (dev.type === 'srt_video') icon = '⚡';

                // Check Status via Go2RTC match
                // We assume source_id matches the stream name in Go2RTC
                const liveData = streams[dev.source_id];
                const isOnline = liveData && liveData.producers && liveData.producers.length > 0;

                card.innerHTML = `
            <div class="card-header">
                <div class="device-icon">${icon}</div>
                <div>
                    <h3>${dev.name}</h3>
                    <div class="stream-status" style="color:${isOnline ? '#0f0' : '#666'}">
                        ${isOnline ? '● ONLINE' : '○ OFFLINE'}
                        <span style="opacity:0.5; font-weight:normal;">(${dev.type})</span>
                    </div>
                </div>
            </div>
            <p style="font-family:monospace; color:#888;">ID: ${dev.source_id}</p>
            ${dev.url ? `<p style="font-size:10px; color:#555; overflow:hidden; text-overflow:ellipsis;">${dev.url}</p>` : ''}
            
            <div class="rtsp-copy-box">
                <input type="text" value="rtsp://${window.location.hostname}:8554/${dev.source_id}" readonly>
                <button class="icon-btn" onclick="copyPublicUrl('${dev.source_id}', 'rtsp')" title="Copy RTSP URL">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24"><path fill="currentColor" d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z" /></svg>
                </button>
            </div>
            
            <div class="rtsp-copy-box" style="margin-top:5px;">
                <input type="text" value="https://cc.dden.mx/stream.html?src=${dev.source_id}" readonly>
                <button class="icon-btn" onclick="copyPublicUrl('${dev.source_id}', 'web')" title="Copy Web Player URL">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24"><path fill="currentColor" d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z" /></svg>
                </button>
            </div>


            <div class="card-actions">
                <button class="btn btn-danger" onclick="deleteDevice('${dev.id}')">REMOVE</button>
            </div>

        `;
                grid.appendChild(card);
            });
        }

        async function syncDevices() {
            const btn = document.getElementById('btn-sync');
            const oldText = btn.innerText;
            btn.innerText = "⏳ SYNCING...";
            btn.disabled = true;

            addLog("Starting manual synchronization of all devices...", "warn");

            try {
                const res = await fetch('/api/devices/sync', { method: 'POST' });
                const results = await res.json();

                addLog(`Sync completed. Success: ${results.success}, Failed: ${results.failed}`, results.failed > 0 ? 'warn' : 'success');

                if (results.details && results.details.length > 0) {
                    results.details.forEach(d => {
                        addLog(`FAILED: ${d.id} - ${d.error}`, "error");
                    });
                }

                btn.innerText = `✅ SYNCED (${results.success})`;
                btn.style.borderColor = "#0f0";

                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.disabled = false;
                    btn.style.borderColor = "";
                }, 3000);

                fetchAll(); // Refresh grid
            } catch (e) {
                addLog(`CRITICAL ERROR during sync: ${e.message}`, "error");
                btn.innerText = "❌ ERROR";
                btn.style.borderColor = "#f00";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.disabled = false;
                    btn.style.borderColor = "";
                }, 3000);
            }
        }


        async function saveDevice() {

            const name = document.getElementById('dev-name').value;
            const type = document.getElementById('dev-type').value;
            const source_id = document.getElementById('dev-source-id').value;
            const url = document.getElementById('dev-url').value;

            if (!name || !source_id) return alert("Name and Source ID are required");
            if (type === 'onvif_video' && !url) return alert("RTSP URL is required for ONVIF cameras");

            const payload = { name, type, source_id, url };

            try {
                const res = await fetch('/api/devices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    closeModal();
                    fetchAll();
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.error || "Unknown"));
                }
            } catch (e) {
                alert("Network Error");
            }
        }

        async function deleteDevice(id) {
            if (!confirm("Are you sure? This will remove the device configuration.")) return;
            try {
                const res = await fetch(`/api/devices/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) fetchAll();
            } catch (e) {
                alert("Error deleting device");
            }
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            updateForm();
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function copyPublicUrl(sourceId, type = 'rtsp') {
            const event = window.event;
            const rtspUrl = `rtsp://${window.location.hostname}:8554/${sourceId}`;
            const webUrl = `https://cc.dden.mx/stream.html?src=${sourceId}`;
            const finalUrl = type === 'web' ? webUrl : rtspUrl;

            const btn = event ? (event.currentTarget.closest('.icon-btn') || event.currentTarget) : null;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(finalUrl).then(() => {
                    if (btn) {
                        const oldContent = btn.innerHTML;
                        const label = type === 'web' ? 'WEB OK!' : 'RTSP OK!';
                        btn.innerHTML = `<span style="color:#0f0; font-size:9px; font-weight:bold;">${label}</span>`;
                        setTimeout(() => btn.innerHTML = oldContent, 1000);
                    }
                });
            } else {
                window.prompt("URL:", finalUrl);
            }
        }


        // Initial fetch

        fetchAll();
        setInterval(fetchAll, 5000); // Polling for status
    </script>
</body>

</html>
