<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar Programs Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f3ff;
            --bg: #0a0a0b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR NAV (CasaOS Style) */
        nav.global-nav {
            width: 70px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
            color: #666;
            text-decoration: none;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* PAGE CONTENT */
        main {
            flex-grow: 1;
            display: flex;
            overflow: hidden;
        }

        /* PROGRAMS SIDEBAR */
        #programs-sidebar {
            width: 300px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prog-item {
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }

        .prog-item:hover {
            background: #1a1a1b;
        }

        .prog-item.active {
            border-left: 3px solid var(--accent);
            background: rgba(0, 243, 255, 0.05);
        }

        .prog-item h4 {
            margin: 0;
            font-size: 14px;
        }

        .prog-item span {
            font-size: 10px;
            color: #666;
        }

        /* DETAIL VIEW */
        #detail-view {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: none;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .trigger-row {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            color: #666;
            margin-bottom: 5px;
        }

        input,
        select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-family: inherit;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accent {
            background: var(--accent);
            color: #000;
            border: none;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            flex-direction: column;
        }

        /* COMPONENT PANEL STYLE */
        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 5px;
        }
    </style>
</head>

<body>
    <nav class="global-nav">
        <a href="/admin.html" class="nav-item" title="Director">
            <svg viewBox="0 0 24 24">
                <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
        </a>
        <a href="/programs.html" class="nav-item active" title="Programs">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,18.54L19.37,12.8L21,14.07L12,21.07L3,14.07L4.62,12.81L12,18.54M12,16L3,9L12,2L21,9L12,16Z" />
            </svg>
        </a>
        <a href="/devices.html" class="nav-item" title="Devices Hub">
            <svg viewBox="0 0 24 24">
                <path
                    d="M4,6H20V16H4M20,18A2,2 0 0,0 22,16V6C22,4.89 21.1,4 20,4H4C2.89,4 2,4.89 2,6V16A2,2 0 0,0 4,18H0V20H24V18H20Z" />
            </svg>
        </a>
    </nav>

    <main>
        <div id="programs-sidebar">
            <div class="sidebar-header">
                <h3 style="margin:0; font-size:16px;">PROGRAMS</h3>
                <button class="btn btn-accent" style="padding: 5px 10px; font-size:11px;"
                    onclick="showCreateProgram()">+ NEW</button>
            </div>
            <div id="prog-list-container" style="flex-grow:0; border-bottom: 2px solid #000;">
                <!-- Installed Programs -->
            </div>
            <div class="sidebar-header" style="background:#0a0a0b; border-bottom: 1px solid #222;">
                <h3 style="margin:0; font-size:12px; opacity:0.5; letter-spacing:1px;">PACKAGE LIBRARY</h3>
            </div>
            <div id="package-list-container" style="flex-grow:1; overflow-y:auto; background:#0d0d0e;">
                <!-- Available Packages -->
            </div>
        </div>

        <div id="detail-view">
            <div class="detail-header">
                <div>
                    <h1 id="prog-detail-title" style="margin:0;">Program Name</h1>
                    <p id="prog-detail-desc" style="color:#666; margin:5px 0 0 0;"></p>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="openExperimentalSpace()">🧪 EXPERIMENT</button>
                    <button id="btn-uninstall" class="btn"
                        style="background:rgba(255,0,0,0.1); color:red; border-color:rgba(255,0,0,0.2); display:none;"
                        onclick="uninstallSelectedTheme()">UNINSTALL</button>
                    <button class="btn btn-accent" onclick="saveProgramChanges()">SAVE CHANGES</button>
                </div>
            </div>

            <span class="panel-title">TRIGGERS & REACTIVE LOGIC</span>
            <div id="prog-triggers-container">
                <!-- Trigger Rows -->
            </div>
            <button class="btn" style="margin-top:20px; padding:8px 15px; font-size:12px;" onclick="addTriggerRow()">+
                ADD TRIGGER</button>
        </div>

        <div id="empty-state"
            style="flex-grow:1; display:flex; align-items:center; justify-content:center; color:#444; flex-direction:column;">
            <svg viewBox="0 0 24 24" style="width:80px; fill:#222; margin-bottom:20px;">
                <path
                    d="M12,18.54L19.37,12.8L21,14.07L12,21.07L3,14.07L4.62,12.81L12,18.54M12,16L3,9L12,2L21,9L12,16Z" />
            </svg>
            <p>Select a program to configure trigger logic</p>
        </div>
    </main>

    <!-- EXP LAB MODAL -->
    <div id="experimental-space" class="modal">
        <div
            style="height:60px; background:#111; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 30px; justify-content:space-between;">
            <h4 style="margin:0;">🧪 EXPERIMENTAL SPACE: <span id="exp-prog-name" style="color:var(--accent);"></span>
            </h4>
            <button class="btn" onclick="closeModal('experimental-space')">EXIT LAB</button>
        </div>
        <div style="flex-grow:1; display:flex; overflow:hidden;">
            <div style="width:300px; background:#0a0a0b; border-right:1px solid #222; padding:30px; overflow-y:auto;">
                <span class="panel-title">TEST TRIGGERS</span>
                <div id="exp-triggers-list" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>
            <div style="flex-grow:1; background:#000; position:relative;">
                <iframe id="exp-preview-frame" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let allPrograms = [];
        let selectedProgramId = null;

        function fetchPrograms() {
            socket.emit('get_programs', (progs) => {
                allPrograms = progs;
                renderList();
                fetchAvailablePackages();
                if (selectedProgramId) selectProgram(selectedProgramId);
            });
        }

        function fetchAvailablePackages() {
            socket.emit('get_available_packages', (packages) => {
                const cont = document.getElementById('package-list-container');
                cont.innerHTML = '';
                packages.forEach(pkg => {
                    const item = document.createElement('div');
                    item.className = 'prog-item';
                    item.style.borderBottom = "1px solid #111";

                    item.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h4 style="margin:0;">${pkg.manifest.name}</h4>
                                <span style="font-size:9px; color:#555;">${pkg.folder}</span>
                            </div>
                            ${pkg.installed ? '<span style="font-size:9px; color:var(--accent)">INSTALLED</span>' : '<button class="btn btn-accent" style="padding:4px 8px; font-size:9px;">INSTALL</button>'}
                        </div>
                    `;
                    if (!pkg.installed) {
                        item.querySelector('button').onclick = () => installPackage(pkg.folder);
                    }
                    cont.appendChild(item);
                });
            });
        }

        function installPackage(folder) {
            socket.emit('install_package', folder, (res) => {
                if (res.error) alert("Error: " + res.error);
                else {
                    fetchPrograms();
                }
            });
        }

        function uninstallSelectedPackage() {
            if (!selectedProgramId) return;
            if (!confirm(`Uninstall ${selectedProgramId}? This will remove it from the programs list, but files in packages/ remain.`)) return;

            socket.emit('uninstall_package', selectedProgramId, (res) => {
                if (res.error) alert(res.error);
                else {
                    selectedProgramId = null;
                    fetchPrograms();
                }
            });
        }

        function renderList() {
            const container = document.getElementById('prog-list-container');
            container.innerHTML = '';
            allPrograms.forEach(p => {
                const div = document.createElement('div');
                div.className = `prog-item ${selectedProgramId === p.id ? 'active' : ''}`;
                div.innerHTML = `<h4>${p.name}</h4><span>${p.id}</span>`;
                div.onclick = () => selectProgram(p.id);
                container.appendChild(div);
            });
        }

        function selectProgram(id) {
            selectedProgramId = id;
            const detail = document.getElementById('detail-view');
            const empty = document.getElementById('empty-state');
            const btnUninstall = document.getElementById('btn-uninstall');

            if (!id) {
                detail.style.display = 'none';
                empty.style.display = 'flex';
                renderList();
                return;
            }

            const prog = allPrograms.find(p => p.id === id);
            if (!prog) return;

            empty.style.display = 'none';
            detail.style.display = 'block';
            btnUninstall.style.display = (prog.is_package || prog.is_theme) ? 'block' : 'none';
            document.getElementById('prog-detail-title').innerText = prog.name;
            document.getElementById('prog-detail-desc').innerText = prog.description || 'No description';

            renderTriggers(prog.triggers || []);
            renderList(); // Update active class
        }

        function renderTriggers(triggers) {
            const cont = document.getElementById('prog-triggers-container');
            cont.innerHTML = '';
            triggers.forEach((t, idx) => {
                const row = document.createElement('div');
                row.className = 'trigger-row';
                row.innerHTML = `
                    <div class="form-group">
                        <label>TRIGGER ID (key)</label>
                        <input type="text" value="${t.id}" onchange="updateTrigger(${idx}, 'id', this.value)">
                    </div>
                    <div class="form-group">
                        <label>FRIENDLY NAME</label>
                        <input type="text" value="${t.name}" onchange="updateTrigger(${idx}, 'name', this.value)">
                    </div>
                    <div class="form-group">
                        <label>ACTION</label>
                        <select onchange="updateTrigger(${idx}, 'action', this.value)">
                            <option value="class_toggle" ${t.action === 'class_toggle' ? 'selected' : ''}>Class Toggle</option>
                            <option value="visibility" ${t.action === 'visibility' ? 'selected' : ''}>Visibility</option>
                            <option value="trigger" ${t.action === 'trigger' ? 'selected' : ''}>Trigger (Transient)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>TARGET (#id / body)</label>
                        <input type="text" value="${t.target}" placeholder="#main_overlay" onchange="updateTrigger(${idx}, 'target', this.value)">
                    </div>
                    <button class="icon-btn" onclick="removeTriggerRow(${idx})">🗑️</button>
                    <div class="form-group" style="grid-column: span 4; margin-top:5px;">
                        <label>VALUE (class name or state)</label>
                        <input type="text" value="${t.value || ''}" placeholder="e.g. active-overlay" onchange="updateTrigger(${idx}, 'value', this.value)">
                    </div>
                `;
                cont.appendChild(row);
            });
        }

        function updateTrigger(idx, key, val) {
            const prog = allPrograms.find(p => p.id === selectedProgramId);
            if (prog) prog.triggers[idx][key] = val;
        }

        function addTriggerRow() {
            const prog = allPrograms.find(p => p.id === selectedProgramId);
            if (!prog) return;
            if (!prog.triggers) prog.triggers = [];
            prog.triggers.push({ id: 'new_trigger', name: 'New Trigger', action: 'class_toggle', target: 'body', value: '' });
            renderTriggers(prog.triggers);
        }

        function removeTriggerRow(idx) {
            const prog = allPrograms.find(p => p.id === selectedProgramId);
            if (prog) {
                prog.triggers.splice(idx, 1);
                renderTriggers(prog.triggers);
            }
        }

        function saveProgramChanges() {
            const prog = allPrograms.find(p => p.id === selectedProgramId);
            if (!prog) return;
            socket.emit('update_program_triggers', { id: prog.id, triggers: prog.triggers }, (res) => {
                if (res.error) alert(res.error);
                else {
                    const btn = event.currentTarget;
                    btn.innerText = "SAVED!";
                    setTimeout(() => btn.innerText = "SAVE CHANGES", 1000);
                }
            });
        }

        function showCreateProgram() {
            const name = prompt("Program Name:");
            if (!name) return;
            const id = name.toLowerCase().replace(/\s+/g, '_');
            socket.emit('create_program', { id, name, description: "Custom logic program" }, (res) => {
                if (res.error) alert(res.error);
                else fetchPrograms();
            });
        }

        function openExperimentalSpace() {
            document.getElementById('experimental-space').style.display = 'flex';
            document.getElementById('exp-prog-name').innerText = selectedProgramId;
            const frame = document.getElementById('exp-preview-frame');
            frame.src = `/host.html?preview=${selectedProgramId}&ts=${Date.now()}`;

            const prog = allPrograms.find(p => p.id === selectedProgramId);
            const list = document.getElementById('exp-triggers-list');
            list.innerHTML = '';
            prog.triggers.forEach(trig => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.style.width = '100%';
                btn.innerText = trig.name;
                btn.onclick = () => {
                    const active = btn.classList.toggle('btn-accent');
                    let payload = null;

                    // If it's a transient trigger and being activated, ask for payload?
                    if (trig.action === 'trigger' && active) {
                        const msg = prompt("Enter Payload (e.g. message text):", "SYSTEM ALERT ACTIVE");
                        if (msg) payload = { message: msg };
                    }

                    const msgType = trig.action === 'trigger' ? 'trigger_state' : 'scene_state';
                    frame.contentWindow.postMessage({ type: msgType, key: trig.id, value: active, payload: payload }, '*');
                };
                list.appendChild(btn);
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        fetchPrograms();
    </script>
</body>

</html>
