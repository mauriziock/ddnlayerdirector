<!DOCTYPE html>
<html lang="es" style="background:#000; color: #00f3ff; font-family: monospace;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar Camera Source</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
        }

        /* FULLSCREEN OVERLAY FOR ROLE SELECTION */
        #role-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .role-btn {
            background: #222;
            border: 1px solid #00f3ff;
            color: #fff;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            margin: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: left;
            position: relative;
        }

        .role-btn:hover {
            background: #333;
        }

        .role-id {
            font-size: 0.8rem;
            color: #888;
        }

        .role-icon {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 1.5rem;
        }

        /* MAIN UI */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .hud {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 20px;
            background: linear-gradient(0deg, #000 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lens-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lens-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-bar {
            font-size: 1rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #000;
        }

        .rec-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            box-shadow: 0 0 5px red;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <!-- ROLE SELECTION -->
    <div id="role-overlay">
        <h2 style="color:#00f3ff; margin-bottom:30px;">SELECT CAMERA ROLE</h2>
        <div id="role-list" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <div style="color:#666;">Waiting for Director scenes...</div>
        </div>
    </div>

    <!-- PREVIEW -->
    <video id="preview" autoplay muted playsinline></video>

    <!-- CONTROLS -->
    <div class="hud">
        <div class="status-bar">
            <span id="role-display" style="color:#aaa;">NO ROLE</span> •
            <span id="status-text" style="color:red">OFFLINE</span>
        </div>

        <div class="lens-controls">
            <button class="lens-btn" onclick="cycleLens()">⭕ SWITCH LENS</button>
        </div>
        <div id="debug-log"
            style="font-size:10px; color:#0f0; max-height:100px; overflow-y:auto; width:90%; background:rgba(0,0,0,0.5); padding:5px; text-align:left;">
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('connect', () => {
            // Re-register if we were already set up (server restart recovery)
            if (currentTarget) {
                log("Re-connected. Refreshing registration...");
                if (mySourceId) {
                    // We had a role, re-claim it?? 
                    // Ideally we just rejoin the signaling channel.
                    socket.emit('register', { role: mySourceId, target: currentTarget });
                } else {
                    socket.emit('register', { role: 'source_candidate', target: currentTarget });
                }
            }
        });

        const debugLog = document.getElementById('debug-log');
        const roleList = document.getElementById('role-list');
        const roleOverlay = document.getElementById('role-overlay');
        const statusText = document.getElementById('status-text');
        const roleDisplay = document.getElementById('role-display');
        const previewVideo = document.getElementById('preview');

        window.onerror = function (msg, url, line) {
            log(`CRITICAL JS ERROR: ${msg} (at ${line})`);
            if (statusText) statusText.innerText = "JS ERROR: See Log";
        };

        function log(msg) {
            console.log(msg);
            // Send to server for remote debugging
            if (socket && socket.connected) socket.emit('client_log', `[${mySourceId || 'CAM'}]: ${msg}`);

            if (debugLog) {
                const line = document.createElement('div');
                line.style.borderBottom = "1px solid rgba(0,243,255,0.1)";
                line.style.padding = "2px 0";
                line.innerHTML = `<span style="color:#666;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                debugLog.insertBefore(line, debugLog.firstChild);
                if (debugLog.children.length > 50) debugLog.lastChild.remove();
            }
        }

        // State
        let mySourceId = null;
        let localStream = null;
        let peerConnection = null;
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let currentQuality = 'medium'; // Default quality
        let myDestSocketId = null; // Direct signaling target
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const urlParams = new URLSearchParams(window.location.search);
        let currentTarget = urlParams.get('target'); // e.g. 'main' or 'tiktok'
        let isLive = false;

        // 1. Initial Logic: If target is missing, discover channels
        if (!currentTarget) {
            log("No target specified. Discovering channels...");
            socket.emit('get_channels', (channels) => {
                roleList.innerHTML = '';
                if (!channels || channels.length === 0) {
                    roleList.innerHTML = '<div style="color:#666;">No active channels found.</div>';
                    return;
                }
                channels.forEach(channel => {
                    const btn = document.createElement('button');
                    btn.className = 'role-btn';
                    btn.innerHTML = `
                        <div>CHANNEL: ${channel.name}</div>
                        <div class="role-id">ID: ${channel.id}</div>
                        <div class="role-icon">🌐</div>
                    `;
                    btn.onclick = () => {
                        currentTarget = channel.id;
                        document.querySelector('#role-overlay h2').innerText = "SELECT CAMERA ROLE";
                        startRegistration();
                    };
                    roleList.appendChild(btn);
                });
            });
        } else {
            startRegistration();
        }

        function startRegistration() {
            log(`Registering on target: ${currentTarget}`);
            socket.emit('register', { role: 'source_candidate', target: currentTarget });
        }

        socket.on('scene_update', (data) => {
            log("Received scene_update from target: " + (data.target || 'unknown'));
            // New format: { target, scene }
            const scene = data.scene || data; // Fallback for safety
            const incomingTarget = (data.target || '').toLowerCase();

            if (currentTarget && incomingTarget !== currentTarget.toLowerCase()) return;

            // Check if my layer has config
            if (mySourceId) {
                const myLayer = scene.layers.find(l => l.source_id === mySourceId);
                if (myLayer) {
                    // Check Quality
                    if (myLayer.camera_quality && myLayer.camera_quality !== currentQuality) {
                        log("Applying saved quality: " + myLayer.camera_quality);
                        currentQuality = myLayer.camera_quality;
                        applyQuality();
                    }
                }
            }

            // Only populate list if we haven't selected a role yet
            if (mySourceId) return;

            const videoSlots = scene.layers.filter(l => l.type.includes('webrtc_video'));

            // AUTO-JOIN LOGIC: Offer a "START" button for gesture
            if (videoSlots.length === 1) {
                log(`Auto-Join candidate found: ${videoSlots[0].id}`);
                roleList.innerHTML = '';
                const btn = document.createElement('button');
                btn.className = 'role-btn';
                btn.style.background = '#00f3ff';
                btn.style.color = '#000';
                btn.style.textAlign = 'center';
                btn.innerHTML = `
                    <div style="font-weight:bold; font-size:1.5rem;">START CAMERA</div>
                    <div class="role-id">Targeting: ${videoSlots[0].id}</div>
                    <div class="role-icon">⚡</div>
                `;
                btn.onclick = () => assignRole(videoSlots[0].source_id);
                roleList.appendChild(btn);
                return;
            }

            roleList.innerHTML = '';
            if (videoSlots.length === 0) {
                roleList.innerHTML = `<div style="color:#666;">No camera slots available in ${currentTarget}.</div>`;
                return;
            }

            videoSlots.forEach(slot => {
                const btn = document.createElement('button');
                btn.className = 'role-btn';
                btn.innerHTML = `
                    <div>${slot.id}</div>
                    <div class="role-id">Source ID: ${slot.source_id}</div>
                    <div class="role-icon">📷</div>
                `;
                btn.onclick = () => assignRole(slot.source_id);
                roleList.appendChild(btn);
            });
        });

        function assignRole(id) {
            log(`[HANDSHAKE] Step 1: ROL SELECCIONADO (${id}) - PREPARANDO CÁMARA...`);
            mySourceId = id;
            roleOverlay.style.display = 'none';
            roleDisplay.innerText = id.toUpperCase();

            // Iniciar captura inmediatamente
            initCamera();

            // Auto-Start (Source Push)
            isLive = true;
            statusText.innerText = "AUTO-STARTING...";
            statusText.style.color = "yellow";
            // initCamera -> startStream -> createOffer will handle the rest.
        }

        socket.on('host_online', (data) => {
            if (isLive && mySourceId) {
                log("[HANDSHAKE] Host appeared! Resending offer...");
                createOffer();
            }
        });

        // Wake Lock
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => console.log('Screen Lock Released'));
                    console.log('Screen Lock Active');
                }
            } catch (err) {
                console.log(`Wake Lock Error: ${err.message}`);
            }
        }

        // 2. Camera Logic
        let currentResolution = { width: 1920, height: 1080 }; // Default

        async function initCamera() {
            log("Initializing Camera...");
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerText = "SECURITY ERROR: Secure Context Required";
                log("ERR: Security Error");
                alert("CRITICAL: Camera API is blocked by the browser.\n\nSince Hangar Mesh runs on local network (HTTP), you MUST enable this flag in Chrome / Brave / Edge:\n\nchrome://flags/#unsafely-treat-insecure-origin-as-secure\n\nAnd add this server's IP and PORT to the list.");
                return;
            }

            await requestWakeLock();

            try {
                // 1. Get Permission
                await navigator.mediaDevices.getUserMedia({ video: true });

                // 2. Enumerate
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                log("Devices found: " + videoDevices.length);
                videoDevices.forEach(d => log(`- ${d.label || 'Unknown'} (${d.deviceId.substr(0, 4)}...)`));

                // Prioritize back camera
                const backIndex = videoDevices.findIndex(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('trasera'));
                if (backIndex !== -1) currentDeviceIndex = backIndex;

                // BROADCAST CAPABILITIES
                await broadcastSourceInfo();

                log(`[HANDSHAKE] Step 2: Permission Granted & Cameras Found (${videoDevices.length})`);
                startStream(videoDevices[currentDeviceIndex]?.deviceId);

            } catch (e) {
                statusText.innerText = "CAM ERROR: " + e.message;
                log("Init Error: " + e.message);
            }
        }

        async function applyQuality() {
            if (!peerConnection) return;
            const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
            if (!sender) {
                log("Quality Warn: No Video Sender found");
                return;
            }

            const params = sender.getParameters();
            if (!params.encodings) params.encodings = [{}];

            let bitrate = undefined;
            switch (currentQuality) {
                case 'low': bitrate = 500000; break;     // 500 kbps
                case 'medium': bitrate = 1500000; break; // 1.5 Mbps
                case 'high': bitrate = 4000000; break;   // 4 Mbps
                case 'ultra': bitrate = 10000000; break; // 10 Mbps (Unlimited-ish)
            }

            if (bitrate) {
                params.encodings[0].maxBitrate = bitrate;
                log(`Setting maxBitrate to ${bitrate / 1000} kbps`);
            } else {
                delete params.encodings[0].maxBitrate;
                log("Setting maxBitrate to UNLIMITED");
            }

            try {
                await sender.setParameters(params);
            } catch (e) {
                log(`Bandwidth Error: ${e.message}`);
            }
        }

        // Remote Control Listener
        socket.on('control_command', (cmd) => {
            if (cmd.target !== mySourceId) return;
            log(`CMD: ${cmd.action} ${cmd.value}`);

            if (cmd.action === 'set_pref') {
                const exactMatch = videoDevices.find(d => d.deviceId === cmd.value);
                if (exactMatch) {
                    log("Switching to exact: " + exactMatch.label);
                    startStream(exactMatch.deviceId);
                } else {
                    const target = videoDevices.find(d => d.label.toLowerCase().includes(cmd.value.toLowerCase()));
                    if (target) {
                        log("Switching to fuzzy: " + target.label);
                        startStream(target.deviceId);
                    } else {
                        log("CMD Error: Lens not found");
                    }
                }
            }

            if (cmd.action === 'set_quality') {
                currentQuality = cmd.value;
                statusText.innerText = `QUAL: ${currentQuality.toUpperCase()}`;
                applyQuality();
            }
        });

        async function startStream(deviceId) {
            log(`Starting stream... Device: ${deviceId ? deviceId.substr(0, 4) + '...' : 'Default'}`);

            // 1. Clean stop of previous streams
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }

            // 2. Hardware Release Delay (Crucial for Android)
            await new Promise(r => setTimeout(r, 500));

            try {
                // 3. Simple Constraints (No Resolution Force)
                const constraints = {
                    video: {
                        deviceId: deviceId ? { exact: deviceId } : undefined,
                        frameRate: { ideal: 30 }
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                };

                log(`Requesting simple constraints...`);
                localStream = await navigator.mediaDevices.getUserMedia(constraints);

                log("[HANDSHAKE] Step 3: Local Stream Created OK");
                preview.srcObject = localStream;
                createOffer();

                // 4. Apply quality after short delay
                setTimeout(applyQuality, 1000);

            } catch (err) {
                log("Stream Error: " + err.name + " " + err.message);

                // Fallback: Total Reset
                try {
                    log("Fallback: Panic mode (Audio+Video generic)");
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    preview.srcObject = localStream;
                    createOffer();
                    log("Fallback success!");
                } catch (err2) {
                    log("Fatal Error: " + err2.message);
                }
            }
        }

        window.cycleLens = () => {
            if (videoDevices.length < 2) {
                log("Cannot switch: Only 1 device found.");
                alert(`Devices found: ${videoDevices.length}. Check permissions.`);
                return;
            }
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            log(`Cycling to: ${videoDevices[currentDeviceIndex].label}`);
            startStream(videoDevices[currentDeviceIndex].deviceId);
        }

        // 3. WebRTC Logic
        async function createOffer() {
            if (peerConnection) peerConnection.close();

            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('candidate', {
                        candidate: event.candidate,
                        target: `host_${currentTarget}`,
                        destSocketId: myDestSocketId,
                        from: socket.id
                    });
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                log(`[P2P] ICE State: ${peerConnection.iceConnectionState}`);
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    statusText.innerText = "ONLINE";
                    statusText.style.color = "#00f3ff";
                    log("[HANDSHAKE] Step 5: P2P ESTABLECIDO SUCCESSFULLY");
                } else {
                    log(`[HANDSHAKE] Connection: ${peerConnection.connectionState}`);
                }
            };

            let offer = await peerConnection.createOffer();

            // --- CALIDAD VDO.NINJA HACK (Alta fidelidad en audio si la cámara tiene mic) ---
            let sdp = offer.sdp;
            sdp = sdp.replace('useinbandfec=1', 'useinbandfec=1;stereo=1;maxaveragebitrate=510000;cbr=1');
            offer = new RTCSessionDescription({ type: 'offer', sdp: sdp });

            await peerConnection.setLocalDescription(offer);

            statusText.innerText = "SIGNALING...";
            statusText.style.color = "yellow";

            log("[HANDSHAKE] Step 3: ENVIANDO OFERTA P2P AL HOST");
            socket.emit('offer', {
                sdp: offer,
                type: 'video',
                from: socket.id,
                sourceId: mySourceId,
                target: currentTarget,
                destSocketId: myDestSocketId
            });
        }

        // socket.on('request_offers') eliminado - El control es manual (Push)

        socket.on('answer', async (data) => {
            if (peerConnection) {
                log(`[HANDSHAKE] Step 4: RESPUESTA RECIBIDA - CONECTANDO... (${data.from})`);
                myDestSocketId = data.from; // Remember who answered
                await peerConnection.setRemoteDescription(data.sdp);
                statusText.innerText = "LINKING...";
                statusText.style.color = "cyan";
            }
        });

        socket.on('candidate', async (data) => {
            if (peerConnection) await peerConnection.addIceCandidate(data.candidate);
        });

    </script>
</body>

</html>
